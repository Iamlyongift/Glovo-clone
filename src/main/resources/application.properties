spring.application.name=QuickChop

# Database ? reads from env var in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/quickchopdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_local_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:ZmFrZXNlY3JldGtleWZvcmRldmVsb3BtZW50b25seTEyMzQ1Njc4OTA=}
app.jwt.expiration-ms=86400000

# Port ? Railway sets PORT automatically
server.port=${PORT:8080}